<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mason Becker</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-zinc-900 text-white">

    <nav class="navbar p-4 shadow">
        <div class="flex gap-8">
            <a href="index.html" class="hover:text-white">Home</a>
            <a href="resume.html" class="hover:text-white">Resume</a>
            <a href="projects.html" class="hover:text-white">Projects</a>
        </div>
    </nav>

    <nav class="mobile-nav">
        <select onchange="window.location=this.value">

            <option value="index.html">Home</option>
            <option value="resume.html">Resume</option>
            <option value="projects.html"> Projects </option>

        </select>
    </nav>

    <main>

        <article id="markdown-content" class="markdown-body">
            Loading...
        </article>

    </main>

</body>

<script src="js/marked.min.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const projectID = params.get("id");
    const article =
        document.getElementById("markdown-content");


    async function loadProject() {
        console.log(projectID);
        const response =
            await fetch(`projects/${projectID}/project.md`);

        if (!response.ok) {
            document.getElementById("markdown-content")
                .innerHTML =
                "<h1>Project not found.</h1>";

            return;
        }

        const markdown =
            await response.text();

        document.getElementById("markdown-content")
            .innerHTML = marked.parse(markdown);

        article
            .querySelectorAll("img")
            .forEach(img => {

                img.src =
                    `projects/${projectID}/${img.getAttribute("src")}`;

            });
    }
    loadProject();
</script>

</html>
