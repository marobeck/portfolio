<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mason Becker - Projects</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-zinc-900 text-white">

    <nav class="navbar p-4 shadow">
        <div class="flex gap-8">
            <a href="index.html" class="hover:text-white">Home</a>
            <a href="resume.html" class="hover:text-white">Resume</a>
            <a class="text-gray-500">Projects</a>
        </div>
    </nav>

    <nav class="mobile-nav">
        <select onchange="window.location=this.value">

            <option value="index.html">Home</option>
            <option value="resume.html">Resume</option>
            <option selected value="projects.html"> Projects </option>

        </select>
    </nav>

    <main class="container mx-auto px-8 py-8">

        <h1 class="text-center text-3xl font-bold mb-8">Projects.</h1>

        <div class="project-filter text-center">
            <button class="active" data-filter="technical">
                Technical Projects
            </button>

            <button data-filter="game">
                Games
            </button>
        </div>

        <br>

        <div id="project-grid"></div>

    </main>

    <div class="footer flex justify-between items-center mt-8">
        <p>&copy; 2026 Mason Becker</p>
        <p>
            <a href="https://www.linkedin.com/in/mason-becker-5b20581b6" target="_blank"> LinkedIn </a>
            &nbsp;|&nbsp;
            <a href="https://github.com/marobeck" target="_blank">GitHub </a>
        </p>
    </div>
</body>

<script>
    let currentFilter = "technical";
    let allProjects = [];

    async function loadProjects() {

        const response = await fetch("projects/projects.json");
        allProjects = await response.json();

        displayProjects();

    }

    function displayProjects() {

        const grid = document.getElementById("project-grid");

        // Remove existing cards
        grid.innerHTML = "";

        // Filter projects
        const filteredProjects = allProjects.filter(project =>
            project.type === currentFilter
        );

        filteredProjects.forEach(project => {

            const card = document.createElement("a");
            card.className = "project-card";

            //----------------------------------------
            // Determine destination
            //----------------------------------------

            if (project.type === "technical") {

                card.href = `project.html?id=${project.folder}`;

            }
            else if (project.type === "game") {

                card.href = project.url;
                card.target = "_blank";
                card.rel = "noopener noreferrer";

            }

            //----------------------------------------
            // Thumbnail
            //----------------------------------------

            if (project.thumbnail) {

                const img = document.createElement("img");

                if (project.type === "technical")
                    img.src = `projects/${project.folder}/${project.thumbnail}`;
                else
                    img.src = `projects/covers/${project.thumbnail}`;

                img.alt = project.title;

                img.onerror = () => {

                    img.remove();
                    card.classList.add("no-image");

                };

                card.appendChild(img);

            }
            else {

                card.classList.add("no-image");

            }

            //----------------------------------------
            // Title
            //----------------------------------------

            const overlay = document.createElement("div");
            overlay.className = "project-overlay";

            const title = document.createElement("h2");
            title.textContent = project.title;
            overlay.appendChild(title);

            card.appendChild(overlay);

            //----------------------------------------
            // Game Role
            //----------------------------------------

            if (project.type === "game" && project.role) {

                const role = document.createElement("p");
                role.className = "project-role";
                role.textContent = project.role;

                overlay.appendChild(role);

            }

            grid.appendChild(card);

        });

    }

    //----------------------------------------
    // Filter Buttons
    //----------------------------------------

    document.querySelectorAll(".project-filter button").forEach(button => {

        button.addEventListener("click", () => {

            currentFilter = button.dataset.filter;

            document.querySelectorAll(".project-filter button")
                .forEach(b => b.classList.remove("active"));

            button.classList.add("active");

            displayProjects();

        });

    });

    loadProjects();

</script>

</html>
